services:
  - type: web
    name: music-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CACHE_MEMORY_ONLY
        value: "1"
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_TOKEN
        sync: false
